<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My World</title>
    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS (Tampilan) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* Animasi Background */
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 10s infinite ease-in-out;
        }
        .orb-1 { width: 200px; height: 200px; background: #ff00cc; top: 10%; left: 20%; }
        .orb-2 { width: 250px; height: 250px; background: #3333ff; bottom: 10%; right: 20%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }
        
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; position: relative; z-index: 1; }
        
        /* Kartu Kaca (Glassmorphism) */
        .profile-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 40px 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px; animation: fadeIn 1s ease-out;
        }
        
        .profile-img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5); margin-bottom: 15px;
            animation: spin 10s linear infinite; animation-play-state: paused;
        }
        .profile-img:hover { animation-play-state: running; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 1.5rem; margin-bottom: 5px; font-weight: 600; }
        p.bio { font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 20px; }
        
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 12px; background: rgba(255, 255, 255, 0.1); color: white;
            text-decoration: none; border-radius: 12px; transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .link-btn:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        .link-btn i { margin-right: 10px; font-size: 1.2rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .music-player { margin-top: 20px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .music-icon { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <!-- Background Animation -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="profile-card">
            <!-- Foto Profil -->
            <img id="profile-pic" src="" alt="Profile Picture" class="profile-img">
            
            <!-- Nama & Bio -->
            <h1 id="username">Loading...</h1>
            <p id="bio" class="bio">Loading...</p>

            <!-- Daftar Link (Akan diisi otomatis oleh Javascript) -->
            <div id="link-container" class="links"></div>

            <!-- Musik Player -->
            <div class="music-player">
                <i class="fas fa-music music-icon"></i>
                <span id="music-text">Tap to Play Music</span>
            </div>
            <audio id="bg-music" loop></audio>
        </div>
    </div>

    <script>
        // ==========================================
        // --- KONFIGURASI (EDIT DI SINI) ---
        // ==========================================
        
        // 1. Foto Profil (Ganti link gambar di bawah)
        const myPhoto = "https://i.pinimg.com/564x/d1/8e/35/d18e3532424242424242424242424242.jpg"; 

        // 2. Nama & Bio
        const myName = "Anita My World";
        const myBio = "Content Creator | Gamer | Dreamer ✨";

        // 3. Daftar Link (Bisa tambah banyak)
        // Icon: fa-instagram, fa-tiktok, fa-youtube, fa-whatsapp, fa-github, fa-linkedin, dll
        const myLinks = [
            { icon: "fab fa-instagram", text: "Instagram", url: "https://instagram.com/username_kamu" },
            { icon: "fab fa-tiktok", text: "TikTok", url: "https://tiktok.com/@username_kamu" },
            { icon: "fab fa-youtube", text: "YouTube", url: "https://youtube.com/channel_kamu" },
            { icon: "fab fa-whatsapp", text: "WhatsApp", url: "https://wa.me/628123456789" },
            { icon: "fas fa-globe", text: "Website Pribadi", url: "https://websitekamu.com" }
        ];

        // 4. Musik (Ganti link MP3 di bawah)
        const myMusic = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

        // ==========================================
        // --- JANGAN UBAH KODE DI BAWAH INI ---
        // ==========================================

        // Set Data ke HTML
        document.getElementById('profile-pic').src = myPhoto;
        document.getElementById('username').innerText = myName;
        document.getElementById('bio').innerText = myBio;
        document.getElementById('bg-music').src = myMusic;

        // Generate Link Buttons
        const linkContainer = document.getElementById('link-container');
        myLinks.forEach(link => {
            const a = document.createElement('a');
            a.className = 'link-btn';
            a.href = link.url;
            a.target = '_blank'; // Buka di tab baru
            a.innerHTML = `<i class="${link.icon}"></i> ${link.text}`;
            linkContainer.appendChild(a);
        });

        // Fitur Musik (Klik untuk play/pause)
        const music = document.getElementById('bg-music');
        const musicText = document.getElementById('music-text');
        let isPlaying = false;

        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                music.play();
                musicText.innerText = "Now Playing...";
                isPlaying = true;
            } else {
                music.pause();
                musicText.innerText = "Tap to Play Music";
                isPlaying = false;
            }
        }, { once: true }); // Trigger sekali saat pertama kali klik

    </script>
</body>
</html>

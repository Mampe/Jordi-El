<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My World 🌍</title>
    <style>
        /* --- BAGIAN CSS (Gaya Tampilan) --- */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #fecfef; font-family: 'Arial', sans-serif; overflow-x: hidden;
        }
        .container {
            text-align: center; background: rgba(255, 255, 255, 0.9);
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px; z-index: 10;
        }
        /* Style Foto/Gambar */
        .main-image {
            width: 100%; border-radius: 15px; margin-bottom: 20px;
            display: block; object-fit: cover; height: 250px;
        }
        /* Style Video */
        .main-video {
            width: 100%; border-radius: 15px; margin-bottom: 20px; display: none;
        }
        h1 { color: #ff4757; font-size: 1.8rem; margin: 10px 0; }
        p { color: #555; line-height: 1.5; }
        .btn-container { position: relative; height: 100px; margin-top: 20px; }
        button {
            padding: 12px 25px; border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        #btn-yes { background: #ff4757; color: white; }
        #btn-no { background: #ddd; color: #333; position: absolute; left: 50%; transform: translateX(20px); }
        #message { display: none; margin-top: 20px; }
        .heart { position: absolute; color: #ff4757; animation: float 4s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <img id="myImage" class="main-image" src="https://images.unsplash.com/photo-1518895949257-7621c3c786d7?w=500" alt="Foto">

        <video id="myVideo" class="main-video" controls>
            <source src="video-kamu.mp4" type="video/mp4">
        </video>

        <h1 id="titleText">Halo Anita! ✨</h1>
        <p id="descText">I just want to say that you are the best part of my world. Do you know how much I like you?</p>

        <div class="btn-container" id="controls">
            <button id="btn-yes" onclick="showLove()">Banget!</button>
            <button id="btn-no" onmouseover="moveNo()">Nggak</button>
        </div>

        <div id="message">
            <h2 style="color: #ff4757;">Yeay! I Love You Too! ❤️</h2>
            <p>Terima kasih sudah ada di duniaku.</p>
        </div>
    </div>

    <audio id="mySong" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <div id="hearts"></div>

    <script>
        /* --- BAGIAN EDIT GAMPANG --- */
        const config = {
            title: "Untuk Anita 🌸",
            description: "Setiap hari bersamamu adalah anugerah. Kamu mau jadi duniaku selamanya?",
            imageURL: "https://images.unsplash.com/photo-1516589174184-c68526617af0?w=500", // Ganti link foto di sini
            useVideo: false, // Ubah jadi true jika ingin menampilkan video sebagai ganti foto
            videoURL: "link-video-kamu.mp4"
        };

        // Menerapkan perubahan teks dari config
        document.getElementById('titleText').innerText = config.title;
        document.getElementById('descText').innerText = config.description;
        document.getElementById('myImage').src = config.imageURL;
        
        if(config.useVideo) {
            document.getElementById('myImage').style.display = 'none';
            document.getElementById('myVideo').style.display = 'block';
        }

        function moveNo() {
            const btnNo = document.getElementById('btn-no');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        function showLove() {
            document.getElementById('controls').style.display = 'none';
            document.getElementById('descText').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            document.getElementById('mySong').play(); // Memutar lagu
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
    </script>
</body>
</html>
